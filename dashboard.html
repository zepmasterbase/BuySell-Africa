<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Deal OS Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:Inter, sans-serif;
}

.card{
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:.2s ease;
}

.card:hover{
transform:translateY(-4px);
}

.badge{
font-size:11px;
padding:4px 8px;
border-radius:999px;
}
</style>
</head>

<body class="bg-slate-100">

<!-- HEADER -->
<div class="bg-black text-white p-4 flex justify-between items-center">

<div>
<h1 class="font-bold">Deal OS Dashboard</h1>
<p class="text-xs text-white/60" id="userInfo"></p>
</div>

<button onclick="logout()" class="bg-white text-black px-4 py-2 rounded-xl text-sm">
Logout
</button>

</div>

<!-- MAIN GRID -->
<div class="max-w-6xl mx-auto grid md:grid-cols-3 gap-4 p-4 mt-4">

<!-- LEFT: ACTION PANEL -->
<div class="bg-white p-4 rounded-2xl card">

<h2 class="font-bold mb-3">⚡ Quick Actions</h2>

<button onclick="go('browsebusinesses.html')"
class="w-full bg-slate-900 text-white py-2 rounded-xl mb-2">
Browse Deals
</button>

<button onclick="go('businesslisting.html')"
class="w-full bg-black text-white py-2 rounded-xl mb-2">
List Business
</button>

<button onclick="openWhatsApp()"
class="w-full bg-green-500 text-black py-2 rounded-xl font-semibold">
Get Matched on WhatsApp
</button>

</div>

<!-- MIDDLE: MY LISTINGS -->
<div class="bg-white p-4 rounded-2xl card">

<h2 class="font-bold mb-3">📦 My Listings</h2>

<div id="myListings" class="space-y-3 text-sm"></div>

</div>

<!-- RIGHT: INSIGHTS -->
<div class="bg-white p-4 rounded-2xl card">

<h2 class="font-bold mb-3">📊 Insights</h2>

<div id="insights" class="space-y-2 text-sm text-slate-600"></div>

<hr class="my-3"/>

<h2 class="font-bold mb-2">🔥 Upgrade Options</h2>

<div class="space-y-2 text-sm">

<div class="p-2 border rounded-lg">
Boost Listing: <b>$10</b>
</div>

<div class="p-2 border rounded-lg">
Pro Plan: <b>$15/month</b>
</div>

<div class="p-2 border rounded-lg">
Premium Plan: <b>$30/month</b>
</div>

</div>

</div>

</div>

<script>

/* -----------------------------
   SESSION CHECK
------------------------------*/

let session = JSON.parse(localStorage.getItem("bsa_session"));

if(!session){
window.location.href = "login-register.html";
}

document.getElementById("userInfo").innerText =
session.name + " • " + session.email;

/* -----------------------------
   DATA
------------------------------*/

let data = JSON.parse(localStorage.getItem("bsa_pipeline")) || [];

/* -----------------------------
   RENDER LISTINGS
------------------------------*/

function loadMyListings(){

let container = document.getElementById("myListings");
container.innerHTML = "";

/* for MVP: show all (later filter by user email) */
let mine = data;

if(mine.length === 0){
container.innerHTML = "<p class='text-slate-400'>No listings yet</p>";
return;
}

mine.forEach(item => {

container.innerHTML += `
<div class="p-3 border rounded-xl">

<div class="font-bold">${item.name}</div>

<div class="text-xs text-slate-500">
${item.location} • ${item.price}
</div>

<div class="text-xs mt-1">
👁 ${item.views || 0} views • 💬 ${item.whatsappClicks || 0} leads
</div>

<span class="badge ${item.status === 'approved' ? 'bg-green-500 text-white' : 'bg-yellow-500 text-white'}">
${item.status || "pending"}
</span>

${item.boosted ? `<span class="badge bg-yellow-400 text-black ml-1">🔥 Boosted</span>` : ""}

</div>
`;
});

}

/* -----------------------------
   INSIGHTS
------------------------------*/

function loadInsights(){

let totalListings = data.length;
let totalViews = data.reduce((a,b)=>a+(b.views||0),0);
let totalLeads = data.reduce((a,b)=>a+(b.whatsappClicks||0),0);
let live = data.filter(d=>d.status==="approved").length;

document.getElementById("insights").innerHTML = `
<p>📌 Total Listings: <b>${totalListings}</b></p>
<p>📌 Live Deals: <b>${live}</b></p>
<p>👁 Total Views: <b>${totalViews}</b></p>
<p>💬 WhatsApp Leads: <b>${totalLeads}</b></p>
<p>📊 Avg Views per Listing: <b>${(totalViews/totalListings || 0).toFixed(1)}</b></p>
<p>⚡ Conversion Rate: <b>${(totalLeads/totalViews*100 || 0).toFixed(1)}%</b></p>
`;
}

/* -----------------------------
   NAV
------------------------------*/

function go(page){
window.location.href = page;
}

/* -----------------------------
   WHATSAPP FUNNEL
------------------------------*/

function openWhatsApp(){

let phone = "27600000000";

let message = "Hi 👋 I want help growing my business listings on Deal OS.";

window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(message));
}

/* -----------------------------
   LOGOUT
------------------------------*/

function logout(){
localStorage.removeItem("bsa_session");
window.location.href = "login-register.html";
}

/* INIT */
loadMyListings();
loadInsights();

</script>

</body>
</html>
