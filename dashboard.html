<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Deal OS Dashboard v3 | Analytics</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:Inter,sans-serif}

.card{
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:.2s ease;
}

.card:hover{
transform:translateY(-4px);
}

.badge{
font-size:11px;
padding:4px 8px;
border-radius:999px;
}
</style>

</head>

<body class="bg-slate-100">

<!-- HEADER -->
<div class="bg-black text-white p-4 flex justify-between items-center">

<div>
<h1 class="font-bold">Deal OS v3 Dashboard</h1>
<p class="text-xs text-white/60" id="userInfo"></p>
</div>

<button onclick="logout()" class="bg-white text-black px-4 py-2 rounded-xl text-sm">
Logout
</button>

</div>

<!-- KPI SECTION -->
<div class="max-w-6xl mx-auto grid md:grid-cols-4 gap-4 p-4 mt-4">

<div class="bg-white p-4 rounded-2xl card">
<p class="text-slate-500 text-sm">My Listings</p>
<h2 id="totalListings" class="text-2xl font-bold">0</h2>
</div>

<div class="bg-white p-4 rounded-2xl card">
<p class="text-slate-500 text-sm">Total Views</p>
<h2 id="totalViews" class="text-2xl font-bold">0</h2>
</div>

<div class="bg-white p-4 rounded-2xl card">
<p class="text-slate-500 text-sm">WhatsApp Leads</p>
<h2 id="totalClicks" class="text-2xl font-bold">0</h2>
</div>

<div class="bg-white p-4 rounded-2xl card">
<p class="text-slate-500 text-sm">Live Deals</p>
<h2 id="liveDeals" class="text-2xl font-bold">0</h2>
</div>

</div>

<!-- MAIN GRID -->
<div class="max-w-6xl mx-auto grid md:grid-cols-3 gap-4 p-4">

<!-- MY LISTINGS -->
<div class="bg-white p-4 rounded-2xl card">

<h2 class="font-bold mb-3">📦 My Listings</h2>

<div id="myListings" class="space-y-3 text-sm"></div>

</div>

<!-- TOP PERFORMERS -->
<div class="bg-white p-4 rounded-2xl card">

<h2 class="font-bold mb-3">🔥 Top Performing Deals</h2>

<div id="topDeals" class="space-y-3 text-sm"></div>

</div>

<!-- INSIGHTS -->
<div class="bg-white p-4 rounded-2xl card">

<h2 class="font-bold mb-3">📊 Insights</h2>

<div id="insights" class="text-sm text-slate-600 space-y-2">

</div>

</div>

</div>

<script>

/* -----------------------------
   SESSION
------------------------------*/

let session = JSON.parse(localStorage.getItem("bsa_session"));

if(!session){
window.location.href = "login-register.html";
}

document.getElementById("userInfo").innerText =
session.name + " • Deal Operator";

/* -----------------------------
   DATA
------------------------------*/

let data = JSON.parse(localStorage.getItem("bsa_pipeline")) || [];

/* -----------------------------
   TRACKING ENGINE
------------------------------*/

function trackView(id){

let item = data.find(d => d.id === id);
if(!item) return;

item.views = (item.views || 0) + 1;
save();
}

function trackWhatsApp(id){

let item = data.find(d => d.id === id);
if(!item) return;

item.whatsappClicks = (item.whatsappClicks || 0) + 1;
save();
}

/* -----------------------------
   SAVE
------------------------------*/

function save(){
localStorage.setItem("bsa_pipeline", JSON.stringify(data));
render();
}

/* -----------------------------
   DASHBOARD RENDER
------------------------------*/

function render(){

let my = data.filter(d => true); // MVP: all visible to user

// KPIs
let totalListings = my.length;
let totalViews = my.reduce((a,b)=>a+(b.views||0),0);
let totalClicks = my.reduce((a,b)=>a+(b.whatsappClicks||0),0);
let liveDeals = my.filter(d=>d.status==="approved").length;

document.getElementById("totalListings").innerText = totalListings;
document.getElementById("totalViews").innerText = totalViews;
document.getElementById("totalClicks").innerText = totalClicks;
document.getElementById("liveDeals").innerText = liveDeals;

// MY LISTINGS
let mine = document.getElementById("myListings");
mine.innerHTML = "";

my.slice(0,6).forEach(item=>{

mine.innerHTML += `
<div class="p-3 border rounded-xl">

<div class="font-bold">${item.name}</div>
<div class="text-xs text-slate-500">
Views: ${item.views || 0} • Leads: ${item.whatsappClicks || 0}
</div>

<span class="badge ${item.status==="approved"?"bg-green-500 text-white":"bg-yellow-500 text-white"}">
${item.status || "pending"}
</span>

</div>
`;
});

// TOP DEALS
let top = [...data]
.sort((a,b)=>(b.whatsappClicks||0)-(a.whatsappClicks||0))
.slice(0,5);

let topDiv = document.getElementById("topDeals");
topDiv.innerHTML = "";

top.forEach(item=>{

topDiv.innerHTML += `
<div class="p-3 border rounded-xl">

<div class="font-bold">${item.name}</div>
<div class="text-xs text-slate-500">
🔥 ${item.whatsappClicks||0} leads • 👁 ${item.views||0} views
</div>

</div>
`;
});

// INSIGHTS
let ins = document.getElementById("insights");
ins.innerHTML = `
<p>📌 Active Listings: ${liveDeals}</p>
<p>📌 Avg Views per Deal: ${(totalViews/totalListings || 0).toFixed(1)}</p>
<p>📌 Conversion Rate: ${(totalClicks/totalViews*100 || 0).toFixed(1)}%</p>
`;

}

/* -----------------------------
   LOGOUT
------------------------------*/

function logout(){
localStorage.removeItem("bsa_session");
window.location.href = "login-register.html";
}

render();

</script>

</body>
</html>
