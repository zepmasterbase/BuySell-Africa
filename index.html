<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BuySell Africa | Africa’s Private Equity Marketplace</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
body{font-family:Inter,sans-serif}

.hero{
background:url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a') center/cover;
}

/* FIX: stronger overlay for readability */
.hero-overlay{
background: rgba(0,0,0,0.75);
}

/* FIX: text clarity */
.hero-text{
text-shadow: 0px 4px 18px rgba(0,0,0,0.8);
}

.glass{
backdrop-filter:blur(14px);
background:rgba(255,255,255,.88);
}

.fade{opacity:0;transform:translateY(20px);transition:.8s}
.fade.show{opacity:1;transform:translateY(0)}

.card:hover{transform:translateY(-6px);transition:.3s}
</style>

<body class="bg-white text-slate-900">

<!-- NAV -->
<nav class="fixed w-full z-50 top-0 shadow-sm">
<div class="glass flex justify-between items-center px-6 py-4">

<div class="font-extrabold text-lg">BuySell Africa</div>

<div class="flex gap-3">
<button onclick="goTo('login-register.html')" class="hover:underline text-sm">
Login
</button>

<button onclick="handleListBusiness()" class="bg-yellow-500 text-white px-4 py-2 rounded-xl text-sm font-semibold">
List Business
</button>
</div>

</div>
</nav>

<!-- HERO -->
<section class="hero h-screen flex items-center justify-center relative">

<!-- FIXED OVERLAY -->
<div class="absolute inset-0 hero-overlay"></div>

<div class="relative text-center text-white max-w-4xl px-6 hero-text">

<h1 class="text-4xl md:text-6xl font-extrabold leading-tight">
Buy, Sell & Invest in African Businesses
</h1>

<p class="mt-4 text-white/90 text-lg font-medium">
Verified opportunities across 15 high-growth African markets.
</p>

<div class="flex flex-col md:flex-row gap-4 justify-center mt-8">

<button onclick="goTo('browsebusinesses.html')"
class="bg-yellow-500 px-6 py-3 rounded-xl font-semibold text-black">
Browse Businesses
</button>

<button onclick="handleListBusiness()"
class="bg-white/10 px-6 py-3 rounded-xl font-semibold">
List Your Business
</button>

</div>

<!-- SEARCH -->
<div class="mt-8 grid md:grid-cols-4 gap-2 bg-white/10 p-4 rounded-xl">

<input class="p-3 rounded text-black" placeholder="Search business..." />

<select class="p-3 rounded text-black">
<option>Country</option>
<option>South Africa</option>
<option>Nigeria</option>
<option>Kenya</option>
<option>Ghana</option>
<option>Egypt</option>
<option>Morocco</option>
<option>Tanzania</option>
<option>Uganda</option>
<option>Rwanda</option>
<option>Zimbabwe</option>
<option>Zambia</option>
<option>Botswana</option>
<option>Namibia</option>
<option>Senegal</option>
</select>

<select class="p-3 rounded text-black">
<option>Industry</option>
<option>Technology</option>
<option>Retail</option>
<option>Logistics</option>
<option>Fintech</option>
<option>Agriculture</option>
<option>Healthcare</option>
</select>

<button onclick="goTo('browsebusinesses.html')"
class="bg-blue-600 text-white rounded-xl px-4 font-semibold">
Search
</button>

</div>

</div>
</section>

<script>
function goTo(page){
window.location.href = page;
}

function isLoggedIn(){
return localStorage.getItem("bsa_logged_in") === "true";
}

function handleListBusiness(){
if(isLoggedIn()){
window.location.href = "businesslisting.html";
}else{
window.location.href = "login-register.html";
}
}
</script>

</body>
</html>
