<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BuySell Africa | Live Marketplace</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:Inter,sans-serif}

.card{
transition:.2s ease;
}
.card:hover{
transform:translateY(-5px);
}

.whatsapp{
background:#25D366;
}

.soft-shadow{
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
</style>

</head>

<body class="bg-slate-50 text-slate-900">

<!-- HEADER -->
<nav class="bg-white border-b fixed w-full top-0 z-50">
<div class="flex justify-between items-center px-6 py-4">

<div class="font-extrabold">BuySell Africa • Live Deals</div>

<button onclick="openWhatsApp('general')" class="whatsapp text-black px-4 py-2 rounded-xl font-semibold text-sm">
Get Matched
</button>

</div>
</nav>

<!-- HERO -->
<section class="pt-28 px-6 text-center">

<h1 class="text-3xl md:text-4xl font-bold">
Live African Business Deals
</h1>

<p class="text-slate-500 mt-2">
Verified listings updated in real-time from admin approval system.
</p>

</section>

<!-- STATS -->
<section class="max-w-5xl mx-auto grid md:grid-cols-3 gap-4 px-6 mt-6">

<div class="bg-white p-4 rounded-2xl soft-shadow text-center">
<h2 class="text-2xl font-bold" id="totalDeals">0</h2>
<p class="text-slate-500 text-sm">Live Deals</p>
</div>

<div class="bg-white p-4 rounded-2xl soft-shadow text-center">
<h2 class="text-2xl font-bold">15+</h2>
<p class="text-slate-500 text-sm">Countries</p>
</div>

<div class="bg-white p-4 rounded-2xl soft-shadow text-center">
<h2 class="text-2xl font-bold">24/7</h2>
<p class="text-slate-500 text-sm">Deal Flow</p>
</div>

</section>

<!-- LISTINGS -->
<section class="max-w-6xl mx-auto mt-10 px-6 grid md:grid-cols-3 gap-6" id="listings">

</section>

<!-- EMPTY STATE -->
<div id="empty" class="text-center text-slate-400 mt-10 hidden">
No approved listings yet. Check back soon.
</div>

<script>

let data = JSON.parse(localStorage.getItem("bsa_pipeline")) || [];

function render(){

let container = document.getElementById("listings");
let empty = document.getElementById("empty");

container.innerHTML = "";

let approved = data.filter(d => d.status === "approved");

document.getElementById("totalDeals").innerText = approved.length;

if(approved.length === 0){
empty.classList.remove("hidden");
return;
}else{
empty.classList.add("hidden");
}

approved.forEach(item => {

container.innerHTML += `
<div class="card bg-white p-4 rounded-2xl soft-shadow">

<h3 class="font-bold text-lg">${item.name}</h3>

<p class="text-slate-500 text-sm">${item.location} • ${item.price}</p>

<p class="text-sm mt-2 text-slate-600">${item.desc}</p>

<button onclick="openWhatsApp('${item.name} - ${item.price}')"
class="whatsapp text-black w-full mt-4 py-2 rounded-xl font-semibold">
Secure via WhatsApp
</button>

</div>
`;
});

}

/* -----------------------------
   WHATSAPP FUNNEL
------------------------------*/

function openWhatsApp(context){

let phone = "27600000000";

let message = "Hi 👋 I am interested in: " + context + ". Please share more details.";

let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

window.open(url, "_blank");
}

/* -----------------------------
   REAL-TIME SYNC
------------------------------*/

// updates when admin changes data in another tab
window.addEventListener("storage", function(){
data = JSON.parse(localStorage.getItem("bsa_pipeline")) || [];
render();
});

// auto refresh fallback
setInterval(() => {
data = JSON.parse(localStorage.getItem("bsa_pipeline")) || [];
render();
}, 3000);

render();

</script>

</body>
</html>
