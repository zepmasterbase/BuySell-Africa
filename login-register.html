<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Login / Register | BuySell Africa</title>
<meta name="description" content="Login or create an account to buy, sell, and invest in African businesses on BuySell Africa." />
<link rel="canonical" href="https://buysellafrica.com/login" />

<meta property="og:title" content="Login / Register | BuySell Africa" />
<meta property="og:description" content="Access your BuySell Africa account as a buyer or seller." />
<meta property="og:type" content="website" />

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
body{font-family:Inter,sans-serif}
.glass{backdrop-filter:blur(16px);background:rgba(255,255,255,0.75)}
.fade{opacity:0;transform:translateY(20px);transition:0.7s}
.fade.show{opacity:1;transform:translateY(0)}
.tab-active{background:#0B0F19;color:white}
</style>

<body class="bg-slate-50 text-slate-900">

<!-- NAV -->
<nav class="fixed top-0 w-full z-50">
<div class="glass flex justify-between items-center px-6 py-4 shadow-sm">
<div class="font-extrabold">BuySell Africa</div>
<div class="flex gap-3">
<a href="index.html" class="text-sm">Home</a>
<a href="browse.html" class="text-sm">Browse</a>
</div>
</div>
</nav>

<!-- HERO -->
<section class="pt-28 px-6 text-center fade">
<h1 class="text-4xl font-extrabold">Welcome Back</h1>
<p class="text-slate-500 mt-2">Login or create an account to continue</p>
</section>

<!-- AUTH BOX -->
<section class="px-6 py-10 fade">
<div class="max-w-md mx-auto bg-white shadow rounded-2xl p-6">

<!-- TABS -->
<div class="flex gap-2 mb-6">
<button id="loginTab" class="flex-1 py-2 rounded-xl tab-active">Login</button>
<button id="registerTab" class="flex-1 py-2 rounded-xl bg-slate-100">Register</button>
</div>

<!-- LOGIN FORM -->
<form id="loginForm" class="space-y-4">

<input class="w-full p-3 border rounded-xl" placeholder="Email Address" type="email" required />
<input class="w-full p-3 border rounded-xl" placeholder="Password" type="password" required />

<button class="w-full bg-[#0B0F19] text-white py-3 rounded-xl hover:bg-black">
Login
</button>

<p class="text-xs text-slate-500 text-center">
Forgot password? Reset via email
</p>

</form>

<!-- REGISTER FORM -->
<form id="registerForm" class="space-y-4 hidden">

<input class="w-full p-3 border rounded-xl" placeholder="Full Name" required />
<input class="w-full p-3 border rounded-xl" placeholder="Email Address" type="email" required />
<input class="w-full p-3 border rounded-xl" placeholder="Password" type="password" required />

<select class="w-full p-3 border rounded-xl">
<option value="buyer">I am a Buyer</option>
<option value="seller">I am a Seller</option>
<option value="investor">I am an Investor</option>
</select>

<button class="w-full bg-[#D4AF37] text-white py-3 rounded-xl hover:opacity-90">
Create Account
</button>

</form>

</div>
</section>

<!-- FOOTER -->
<footer class="py-10 text-center text-sm text-slate-500">
© 2026 BuySell Africa — Secure Access Portal
</footer>

<script>
// fade animation
const obs=new IntersectionObserver(e=>e.forEach(x=>{
if(x.isIntersecting)x.target.classList.add('show')
}));
document.querySelectorAll('.fade').forEach(el=>obs.observe(el));

// tabs
const loginTab=document.getElementById("loginTab");
const registerTab=document.getElementById("registerTab");
const loginForm=document.getElementById("loginForm");
const registerForm=document.getElementById("registerForm");

loginTab.onclick=()=>{
loginForm.classList.remove("hidden");
registerForm.classList.add("hidden");

loginTab.classList.add("tab-active");
registerTab.classList.remove("tab-active");
registerTab.classList.add("bg-slate-100");
};

registerTab.onclick=()=>{
registerForm.classList.remove("hidden");
loginForm.classList.add("hidden");

registerTab.classList.add("tab-active");
loginTab.classList.remove("tab-active");
loginTab.classList.add("bg-slate-100");
};
</script>

</body>
</html>
