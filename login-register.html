<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Login / Register | BuySell Africa</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:Inter, sans-serif;
}

.card{
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
</style>

</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen">

<!-- MAIN CARD -->
<div class="bg-white w-full max-w-md p-6 rounded-2xl card">

<!-- HEADER -->
<h1 class="text-2xl font-bold text-center">BuySell Africa</h1>
<p class="text-center text-slate-500 text-sm mt-1">
Access your Deal Dashboard
</p>

<!-- TOGGLE -->
<div class="flex mt-6 bg-slate-100 p-1 rounded-xl">

<button onclick="showLogin()" id="loginTab"
class="w-1/2 py-2 rounded-xl bg-black text-white text-sm">
Login
</button>

<button onclick="showRegister()" id="registerTab"
class="w-1/2 py-2 rounded-xl text-sm">
Register
</button>

</div>

<!-- FORM -->
<div class="mt-6">

<!-- EMAIL -->
<input id="email"
type="email"
placeholder="Email"
class="w-full p-3 border rounded-xl mb-3"/>

<!-- PASSWORD -->
<input id="password"
type="password"
placeholder="Password"
class="w-full p-3 border rounded-xl mb-3"/>

<!-- NAME (REGISTER ONLY) -->
<input id="name"
type="text"
placeholder="Full Name"
class="w-full p-3 border rounded-xl mb-3 hidden"/>

<!-- ACTION BUTTON -->
<button onclick="handleAuth()"
class="w-full bg-black text-white py-3 rounded-xl font-semibold">

Login
</button>

<!-- ERROR -->
<p id="msg" class="text-red-500 text-sm mt-3 text-center"></p>

</div>

</div>

<script>

/* -----------------------------
   STATE
------------------------------*/

let mode = "login"; // login | register

function showLogin(){
mode = "login";

document.getElementById("loginTab").classList.add("bg-black","text-white");
document.getElementById("registerTab").classList.remove("bg-black","text-white");

document.querySelector("button[onclick='handleAuth()']").innerText = "Login";

document.getElementById("name").classList.add("hidden");
}

function showRegister(){
mode = "register";

document.getElementById("registerTab").classList.add("bg-black","text-white");
document.getElementById("loginTab").classList.remove("bg-black","text-white");

document.querySelector("button[onclick='handleAuth()']").innerText = "Create Account";

document.getElementById("name").classList.remove("hidden");
}

/* -----------------------------
   AUTH SYSTEM (LOCAL STORAGE)
------------------------------*/

function handleAuth(){

let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();
let name = document.getElementById("name").value.trim();
let msg = document.getElementById("msg");

if(!email || !password){
msg.innerText = "Please fill all required fields";
return;
}

let users = JSON.parse(localStorage.getItem("bsa_users")) || [];

/* ---------------- REGISTER ---------------- */
if(mode === "register"){

if(!name){
msg.innerText = "Please enter your name";
return;
}

let exists = users.find(u => u.email === email);

if(exists){
msg.innerText = "User already exists. Please login.";
return;
}

users.push({
id: Date.now(),
name,
email,
password
});

localStorage.setItem("bsa_users", JSON.stringify(users));

msg.style.color = "green";
msg.innerText = "Account created successfully! Logging in...";

loginUser(email, password);

return;
}

/* ---------------- LOGIN ---------------- */

loginUser(email, password);

}

/* ---------------- LOGIN FUNCTION ---------------- */

function loginUser(email, password){

let users = JSON.parse(localStorage.getItem("bsa_users")) || [];

let user = users.find(u => u.email === email && u.password === password);

if(!user){
document.getElementById("msg").style.color = "red";
document.getElementById("msg").innerText = "Invalid email or password";
return;
}

/* SAVE SESSION */
localStorage.setItem("bsa_session", JSON.stringify({
loggedIn:true,
userId:user.id,
name:user.name,
email:user.email
}));

// redirect to dashboard
window.location.href = "dashboard.html";
}

/* ---------------- AUTO LOGIN CHECK ---------------- */

(function checkSession(){

let session = JSON.parse(localStorage.getItem("bsa_session"));

if(session && session.loggedIn){
window.location.href = "dashboard.html";
}

})();

/* INIT */
showLogin();

</script>

</body>
</html>
